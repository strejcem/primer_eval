name: Build and Release Binaries

on:
  release:
    types: [published]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: primer_eval
            asset_name: primer_eval-linux-amd64
          - os: windows-latest
            artifact_name: primer_eval.exe
            asset_name: primer_eval-windows-amd64.exe
          - os: macos-latest
            artifact_name: primer_eval
            asset_name: primer_eval-macos-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Build for Release
      run: cargo build --release --locked

    - name: Prepare binary for upload
      shell: bash
      run: |
        # Move the binary from the target folder to the root and rename it
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv target/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}
        else
          mv target/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}
          chmod +x ./${{ matrix.asset_name }}
        fi

    - name: Upload binaries to release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.asset_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}